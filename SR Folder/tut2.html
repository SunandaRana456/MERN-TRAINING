<!DOCTYPE html>

<head>

    <title>tables and lists</title>
</head>
<body>
    <ul type="square">
        <li>this is first</li>
        <li>this is first</li>
        <li>this is first</li>

    <ol type="i">

    </ol>
</body>
</html>
